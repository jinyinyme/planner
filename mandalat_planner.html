<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만다라트 인생 플래너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c1: #1a1a2e; --c2: #16213e; --c3: #0f3460; --accent: #e94560;
  --gold: #f5a623; --teal: #00b4d8; --green: #06d6a0;
  --text: #eef2ff; --muted: #8892b0; --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.1);
}
html, body { height: 100%; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--c1); color: var(--text); }
#app { min-height: 100vh; display: flex; flex-direction: column; }

.nav { display: flex; gap: 4px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--c2); position: sticky; top: 0; z-index: 50; }
.nav-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-right: 8px; display: flex; align-items: center; white-space: nowrap; }
.nav-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; transition: all 0.2s; font-family: inherit; }
.nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.view { display: none; padding: 16px; flex: 1; }
.view.active { display: block; }

/* MANDALART */
.section-header { margin-bottom: 16px; }
.section-header h2 { font-size: 18px; font-weight: 600; }
.section-header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

.mandala-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; max-width: 720px; margin: 0 auto; }
.block { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; padding: 4px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); }
.block.center-block { border-color: var(--accent); background: rgba(233,69,96,0.08); }
.block.sub-block { border-color: rgba(0,180,216,0.3); }

.cell { border-radius: 6px; padding: 5px 4px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; min-height: 46px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: rgba(255,255,255,0.03); }
.cell:hover { background: rgba(255,255,255,0.08); border-color: var(--border); }
.cell.center-core { background: rgba(233,69,96,0.2); border-color: var(--accent); }
.cell.sub-center { background: rgba(0,180,216,0.15); border-color: rgba(0,180,216,0.4); }
.cell.filled { border-color: rgba(255,255,255,0.15); }
.cell-num { font-size: 9px; color: var(--muted); line-height: 1; margin-bottom: 2px; }
.cell-text { font-size: 10px; line-height: 1.3; color: var(--text); word-break: keep-all; }
.cell-empty { font-size: 18px; color: rgba(255,255,255,0.1); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--c2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; }
.modal h3 { font-size: 16px; margin-bottom: 6px; }
.modal p { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.modal textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; font-size: 14px; resize: none; height: 80px; font-family: inherit; }
.modal textarea:focus { outline: none; border-color: var(--teal); }
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; font-family: inherit; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.9; }
.btn-cancel { background: transparent; color: var(--muted); }
.btn-cancel:hover { background: var(--surface); }
.btn-danger { background: rgba(233,69,96,0.2); color: var(--accent); border-color: rgba(233,69,96,0.3); }

/* DAILY PLANNER */
.daily-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.date-nav { display: flex; align-items: center; gap: 10px; }
.date-nav button { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.date-display { font-size: 16px; font-weight: 600; }
.date-sub { font-size: 11px; color: var(--muted); text-align: center; }

.task-input-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.task-input-row input { flex: 1; min-width: 160px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 14px; font-family: inherit; }
.task-input-row input:focus { outline: none; border-color: var(--teal); }
.tag-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 8px; border-radius: 10px; font-size: 12px; cursor: pointer; max-width: 130px; font-family: inherit; }
.add-btn { background: var(--accent); border: none; color: white; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; font-family: inherit; }

.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.task-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.task-check.done { background: var(--green); border-color: var(--green); }
.task-text { flex: 1; font-size: 14px; }
.task-text.done { text-decoration: line-through; color: var(--muted); }
.task-tag { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 500; flex-shrink: 0; }
.task-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
.task-del:hover { color: var(--accent); }

/* STATS */
.stats-section { margin-bottom: 20px; }
.stats-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--teal); }
.week-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.week-selector button { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.week-label { font-size: 14px; font-weight: 500; }
.stat-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
.stat-card .val { font-size: 24px; font-weight: 700; }
.stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; width: 80px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.bar-track { flex: 1; background: rgba(255,255,255,0.06); border-radius: 4px; height: 18px; position: relative; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.bar-fill span { font-size: 10px; color: white; font-weight: 600; }
.bar-count { font-size: 12px; color: var(--muted); width: 30px; text-align: right; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

@media (max-width: 480px) {
  .mandala-grid { gap: 4px; }
  .block { gap: 2px; padding: 3px; }
  .cell { min-height: 38px; padding: 3px 2px; }
  .cell-text { font-size: 9px; }
  .nav-btn { padding: 7px 12px; font-size: 12px; }
}
</style>
</head>
<body>
<div id="app">
<div class="nav">
  <div class="nav-title">✦ 만다라트</div>
  <button class="nav-btn active" onclick="showView('mandala')">목표판</button>
  <button class="nav-btn" onclick="showView('daily')">하루 플래너</button>
  <button class="nav-btn" onclick="showView('stats')">주간 통계</button>
</div>

<div id="view-mandala" class="view active">
  <div class="section-header">
    <h2>만다라트 목표 설계</h2>
    <p>가운데 핵심 목표를 클릭하고, 8개 세부 목표와 64개 실행 계획을 입력하세요</p>
  </div>
  <div id="mandala-grid" class="mandala-grid"></div>
</div>

<div id="view-daily" class="view">
  <div class="daily-header">
    <div class="date-nav">
      <button onclick="changeDay(-1)">&#8249;</button>
      <div>
        <div class="date-display" id="date-display"></div>
        <div class="date-sub" id="date-sub"></div>
      </div>
      <button onclick="changeDay(1)">&#8250;</button>
    </div>
    <button class="nav-btn" onclick="showView('stats')" style="font-size:12px;padding:6px 12px;">통계 보기</button>
  </div>
  <div class="task-input-row">
    <input type="text" id="task-input" placeholder="오늘 할 일을 입력하세요..." onkeydown="if(event.key==='Enter')addTask()"/>
    <select class="tag-select" id="task-tag"><option value="">목표 없음</option></select>
    <button class="add-btn" onclick="addTask()">+</button>
  </div>
  <div id="task-list" class="task-list"></div>
</div>

<div id="view-stats" class="view">
  <div class="week-selector">
    <button onclick="changeWeek(-1)">&#8249;</button>
    <span class="week-label" id="week-label"></span>
    <button onclick="changeWeek(1)">&#8250;</button>
  </div>
  <div class="stats-section">
    <div class="stat-cards" id="stat-cards"></div>
  </div>
  <div class="stats-section">
    <h3>목표별 실행 현황</h3>
    <div id="legend-area" class="legend"></div>
    <div id="bar-chart" class="bar-chart"></div>
  </div>
  <div class="stats-section">
    <h3>요일별 완료 현황</h3>
    <div id="weekday-chart" class="bar-chart"></div>
  </div>
</div>
</div>

<div id="modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3 id="modal-title">목표 입력</h3>
    <p id="modal-desc">이 칸의 내용을 입력하세요</p>
    <textarea id="modal-input" placeholder="내용을 입력하세요..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" id="modal-clear-btn" onclick="clearCell()" style="display:none;">삭제</button>
      <button class="btn btn-primary" onclick="saveCell()">저장</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#e94560','#f5a623','#06d6a0','#00b4d8','#a78bfa','#f472b6','#fb923c','#34d399'];
const DAYS_KO = ['일','월','화','수','목','금','토'];
const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

let state = {
  cells: {}, tasks: {},
  currentDate: new Date(),
  currentWeekOffset: 0,
  modal: { open: false, blockIdx: null, cellIdx: null }
};

function saveState() {
  try { localStorage.setItem('mandalart_v2', JSON.stringify({cells: state.cells, tasks: state.tasks})); } catch(e){}
}
function loadState() {
  try {
    const d = localStorage.getItem('mandalart_v2');
    if(d) { const p=JSON.parse(d); state.cells=p.cells||{}; state.tasks=p.tasks||{}; }
  } catch(e){}
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getCellId(b,c) { return `${b}_${c}`; }
function getCellValue(b,c) { return state.cells[getCellId(b,c)] || ''; }

function bToSubIdx(b) {
  const map = {0:0,1:1,2:2,3:3,5:4,6:5,7:6,8:7};
  return map[b] ?? 0;
}

function buildMandalart() {
  const grid = document.getElementById('mandala-grid');
  grid.innerHTML = '';
  for(let b=0; b<9; b++) {
    const block = document.createElement('div');
    block.className = 'block' + (b===4 ? ' center-block' : ' sub-block');
    for(let c=0; c<9; c++) {
      const isCoreCenter = b===4 && c===4;
      const isSubCenter = c===4 && b!==4;
      const isCenterBlockSub = b===4 && !isCoreCenter;
      const val = getCellValue(b,c);
      const cell = document.createElement('div');
      cell.className = 'cell' + (isCoreCenter?' center-core':isSubCenter?' sub-center':isCenterBlockSub?' sub-center':val?' filled':'');
      cell.onclick = () => openModal(b,c);

      let colorStyle = '';
      if(isCoreCenter) colorStyle = 'color:var(--accent);font-weight:700;';
      else if(isSubCenter) { const ci=b<4?b:b-1; colorStyle=`color:${COLORS[ci]};font-weight:600;`; }
      else if(isCenterBlockSub) { const ci=bToSubIdx(b); colorStyle=`color:${COLORS[ci]};font-weight:600;`; }

      if(isCoreCenter) {
        cell.innerHTML = `<div class="cell-num">핵심목표</div><div class="cell-text" style="${colorStyle}">${val||'+'}</div>`;
      } else if(isSubCenter) {
        const ci=b<4?b:b-1;
        cell.innerHTML = `<div class="cell-num" style="color:${COLORS[ci]}">목표${ci+1}</div><div class="cell-text" style="${colorStyle}">${val||'+'}</div>`;
      } else if(isCenterBlockSub) {
        const ci=bToSubIdx(b);
        cell.innerHTML = `<div class="cell-text" style="${colorStyle}">${val||'+'}</div>`;
      } else {
        cell.innerHTML = val ? `<div class="cell-text">${val}</div>` : `<div class="cell-empty">+</div>`;
      }
      block.appendChild(cell);
    }
    grid.appendChild(block);
  }
}

function openModal(b, c) {
  state.modal = {open:true, blockIdx:b, cellIdx:c};
  const val = getCellValue(b,c);
  const isCoreCenter = b===4 && c===4;
  const isSubCenter = c===4 && b!==4;
  const isCenterSub = b===4 && c!==4;
  let title = '실행 계획 입력';
  let desc = '구체적인 실행 계획을 입력하세요';
  if(isCoreCenter) { title='핵심 목표 설정'; desc='인생에서 이루고 싶은 가장 중요한 목표를 입력하세요'; }
  else if(isSubCenter) { const ci=b<4?b:b-1; title=`세부 목표 ${ci+1} 설정`; desc='핵심 목표를 달성하기 위한 세부 목표를 입력하세요'; }
  else if(isCenterSub) { const ci=bToSubIdx(b); title=`목표 ${ci+1}의 실행 계획`; desc='세부 목표를 달성하기 위한 실행 계획을 입력하세요'; }
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;
  document.getElementById('modal-input').value = val;
  document.getElementById('modal-clear-btn').style.display = val ? 'block' : 'none';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveCell() {
  const {blockIdx:b, cellIdx:c} = state.modal;
  const val = document.getElementById('modal-input').value.trim();
  if(val) state.cells[getCellId(b,c)] = val;
  else delete state.cells[getCellId(b,c)];
  saveState(); closeModal(); buildMandalart(); updateTagSelect();
}

function clearCell() {
  const {blockIdx:b, cellIdx:c} = state.modal;
  delete state.cells[getCellId(b,c)];
  saveState(); closeModal(); buildMandalart(); updateTagSelect();
}

function getGoalTags() {
  const tags = [];
  for(let b=0;b<9;b++) {
    if(b===4) continue;
    const ci = b<4?b:b-1;
    const label = getCellValue(b,4);
    if(label) tags.push({id:`goal_${ci}`, label, color: COLORS[ci], blockIdx:b});
  }
  return tags;
}

function updateTagSelect() {
  const sel = document.getElementById('task-tag');
  const cur = sel.value;
  sel.innerHTML = '<option value="">목표 없음</option>';
  getGoalTags().forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.label.length>8 ? t.label.slice(0,8)+'...' : t.label;
    sel.appendChild(opt);
  });
  if(cur) sel.value = cur;
}

function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if(!text) return;
  const tagId = document.getElementById('task-tag').value;
  const dk = dateKey(state.currentDate);
  if(!state.tasks[dk]) state.tasks[dk] = [];
  state.tasks[dk].push({id: Date.now(), text, tagId, done: false});
  input.value = '';
  saveState(); renderDailyTasks();
}

function toggleTask(dk, id) {
  const task = (state.tasks[dk]||[]).find(t=>t.id===id);
  if(task) { task.done = !task.done; saveState(); renderDailyTasks(); }
}

function deleteTask(dk, id) {
  if(state.tasks[dk]) {
    state.tasks[dk] = state.tasks[dk].filter(t=>t.id!==id);
    saveState(); renderDailyTasks();
  }
}

function renderDailyTasks() {
  const dk = dateKey(state.currentDate);
  const tasks = state.tasks[dk] || [];
  const tags = getGoalTags();
  const container = document.getElementById('task-list');
  if(!tasks.length) {
    container.innerHTML = '<div class="empty-state">오늘의 할 일을 추가해보세요 ✦</div>';
    return;
  }
  container.innerHTML = '';
  tasks.forEach(task => {
    const tag = tags.find(t=>t.id===task.tagId);
    const div = document.createElement('div');
    div.className = 'task-item';
    div.innerHTML = `
      <div class="task-check ${task.done?'done':''}" onclick="toggleTask('${dk}',${task.id})">
        ${task.done?'<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" fill="none"/></svg>':''}
      </div>
      <span class="task-text ${task.done?'done':''}">${task.text}</span>
      ${tag?`<span class="task-tag" style="background:${tag.color}22;color:${tag.color}">${tag.label.length>6?tag.label.slice(0,6)+'...':tag.label}</span>`:''}
      <button class="task-del" onclick="deleteTask('${dk}',${task.id})">×</button>
    `;
    container.appendChild(div);
  });
}

function updateDateDisplay() {
  const d = state.currentDate;
  document.getElementById('date-display').textContent =
    `${d.getFullYear()}년 ${MONTHS_KO[d.getMonth()]} ${d.getDate()}일`;
  document.getElementById('date-sub').textContent = `${DAYS_KO[d.getDay()]}요일`;
}

function changeDay(delta) {
  const d = new Date(state.currentDate);
  d.setDate(d.getDate() + delta);
  state.currentDate = d;
  updateDateDisplay(); renderDailyTasks();
}

function getWeekDates(offset) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + (day===0?-6:1) + offset*7);
  const dates = [];
  for(let i=0;i<7;i++) { const d=new Date(mon); d.setDate(mon.getDate()+i); dates.push(d); }
  return dates;
}

function changeWeek(delta) {
  state.currentWeekOffset += delta;
  renderStats();
}

function renderStats() {
  const dates = getWeekDates(state.currentWeekOffset);
  const tags = getGoalTags();
  const start = dates[0], end = dates[6];
  document.getElementById('week-label').textContent =
    `${start.getMonth()+1}/${start.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}`;

  let totalTasks=0, doneTasks=0;
  const tagCount = {};
  const dayCount = [0,0,0,0,0,0,0];

  dates.forEach((d,i) => {
    const dk = dateKey(d);
    const tasks = state.tasks[dk] || [];
    tasks.forEach(t => {
      totalTasks++;
      if(t.done) {
        doneTasks++;
        dayCount[i]++;
        if(t.tagId) tagCount[t.tagId] = (tagCount[t.tagId]||0)+1;
      }
    });
  });

  const rate = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="val" style="color:var(--teal)">${totalTasks}</div><div class="lbl">총 할일</div></div>
    <div class="stat-card"><div class="val" style="color:var(--green)">${doneTasks}</div><div class="lbl">완료</div></div>
    <div class="stat-card"><div class="val" style="color:var(--gold)">${rate}%</div><div class="lbl">달성률</div></div>
  `;

  const legend = document.getElementById('legend-area');
  legend.innerHTML = '';
  tags.forEach(t => {
    const el = document.createElement('div');
    el.className = 'legend-item';
    el.innerHTML = `<div class="legend-dot" style="background:${t.color}"></div><span>${t.label}</span>`;
    legend.appendChild(el);
  });

  const barChart = document.getElementById('bar-chart');
  if(!tags.length) {
    barChart.innerHTML = '<div class="empty-state">만다라트에 목표를 먼저 입력하세요</div>';
  } else {
    const maxVal = Math.max(...tags.map(t=>tagCount[t.id]||0), 1);
    barChart.innerHTML = '';
    [...tags].sort((a,b)=>(tagCount[b.id]||0)-(tagCount[a.id]||0)).forEach(t => {
      const cnt = tagCount[t.id]||0;
      const pct = Math.round(cnt/maxVal*100);
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = `
        <div class="bar-label">${t.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${t.color}"><span>${cnt>0?cnt:''}</span></div></div>
        <div class="bar-count">${cnt}</div>
      `;
      barChart.appendChild(row);
    });
  }

  const dayNames = ['월','화','수','목','금','토','일'];
  const wChart = document.getElementById('weekday-chart');
  const maxDay = Math.max(...dayCount, 1);
  wChart.innerHTML = '';
  dayCount.forEach((cnt,i) => {
    const pct = Math.round(cnt/maxDay*100);
    const isToday = dateKey(dates[i]) === dateKey(new Date()) && state.currentWeekOffset===0;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label" style="${isToday?'color:var(--teal);font-weight:600':''}">
        ${dayNames[i]}요일${isToday?' ★':''}
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${isToday?'var(--teal)':'var(--accent)'}">
          <span>${cnt>0?cnt:''}</span>
        </div>
      </div>
      <div class="bar-count">${cnt}</div>
    `;
    wChart.appendChild(row);
  });
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const idx = ['mandala','daily','stats'].indexOf(name);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(name==='daily') { updateDateDisplay(); renderDailyTasks(); updateTagSelect(); }
  if(name==='stats') renderStats();
}

// init
loadState();
buildMandalart();
updateDateDisplay();
</script>
</body>
</html>
